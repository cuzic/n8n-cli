name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint and format check
        run: biome check src/ tests/

      - name: Run tests
        run: bun test

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: n8n-cli-darwin-arm64
          - target: bun-darwin-x64
            artifact: n8n-cli-darwin-x64
          - target: bun-linux-x64
            artifact: n8n-cli-linux-x64
          - target: bun-windows-x64
            artifact: n8n-cli-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Determine version info
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile dist/${{ matrix.artifact }} \
            --minify \
            --define "CLI_VERSION='${{ steps.version.outputs.version }}'" \
            --define "CLI_GIT_COMMIT='${{ steps.version.outputs.commit }}'" \
            --define "CLI_BUILD_DATE='${{ steps.version.outputs.date }}'"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/n8n-cli-darwin-arm64
            dist/n8n-cli-darwin-x64
            dist/n8n-cli-linux-x64
            dist/n8n-cli-windows-x64.exe
            dist/checksums.txt
